<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <title>Guess the Correlation</title>
        <link rel="icon" href="../ASSETS/favicon.ico" type="image/x-icon"/>
        
        <!-- External Libraries for Graphing and Lottie Animation-->
        
        <script src="https://cdn.jsdelivr.net/npm/lottie-web@5.13.0/build/player/lottie.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
        
        <!-- Math Medic JS -->
        <script src="../JS/mmapplets.js"></script>
        <script src="../JS/guesscorr.js"></script>
        
        <link rel="stylesheet" href="../CSS/mmapplets.css">
        <link rel="stylesheet" href="../CSS/guesscorr.css">
    </head>
    <body>
        <div class="pageHeader">
            <img class="headerImage" src="../ASSETS/math-medic-logo.svg" alt="Math Medic Logo">
            <p class="headbarTitle"><a href="https://mathmedic.com" target="_blank">Guess the Correlation</a></p>
        </div>
        <div id="mainSection" class="sectionContainer">
            <div id="graphOutput">
                
            </div>
            <div id="guessInputHolder">
                <label for="guessCorrelationInput">Guess the correlation: </label><input type="number" inputmode="numeric" pattern="[0-9]*" id="corrInput"><button id="revealAnswerBtn" oninput="removeLetters(this)">Reveal Answer</button>
            </div>
            <div id="guessOutputHolder">
                <p id="realValuesInfo">N/A</p>
                <p id="errorValOutputInfo">N/A</p>
            </div>
        </div>
    </body>
</html>
